server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/earthquake_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

usgs.api.url=https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson

earthquake.filter.min-magnitude=2.0

spring.web.cors.allowed-origins=http://localhost:3000

logging.level.mk.codeit=DEBUG
